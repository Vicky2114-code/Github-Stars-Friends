name: CI

# Runs on every push and PR. Vercel deploys independently — this
# workflow is the safety net that catches regressions before users do.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Type + Unit + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run typecheck

      - name: Unit tests (Bun test)
        run: bun test
        env:
          # Tests mock fetch — no real API keys needed for unit pass
          NODE_ENV: test

      - name: Build (verify production bundle compiles)
        run: bun run build

      - name: Install Playwright browser
        run: bunx playwright install chromium --with-deps

      - name: Playwright e2e
        run: bun run test:e2e
        env:
          # E2E starts a dev server which can render in degraded mode
          # without API keys (testing the fallback paths is intentional).
          NODE_ENV: test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
